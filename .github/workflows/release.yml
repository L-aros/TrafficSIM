name: Release APK

on:
  push:
    branches:
      - "main"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  build_release:
    runs-on: ubuntu-latest
    env:
      LANG: C.UTF-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Compute release metadata
        id: meta
        run: |
          short="${GITHUB_SHA::7}"
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "tag=auto-${GITHUB_RUN_NUMBER}-$short" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: |
          [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] || { echo "::error::Missing secret KEYSTORE_BASE64"; exit 1; }
          [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] || { echo "::error::Missing secret KEYSTORE_PASSWORD"; exit 1; }
          [ -n "${{ secrets.KEY_ALIAS }}" ] || { echo "::error::Missing secret KEY_ALIAS"; exit 1; }
          [ -n "${{ secrets.KEY_PASSWORD }}" ] || { echo "::error::Missing secret KEY_PASSWORD"; exit 1; }
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
          test -s keystore/release.keystore

      - name: Create keystore properties
        run: |
          cat > keystore/keystore.properties <<EOF
          storeFile=keystore/release.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          test -s keystore/keystore.properties

      - name: Fetch LSPosed API jar
        run: |
          mkdir -p app/libs
          if [ ! -f app/libs/api-82.jar ]; then
            curl -fL -o app/libs/api-82.jar https://artifactory.appodeal.com/appodeal-public/de/robv/android/xposed/api/82/api-82.jar || \
            curl -fL -o app/libs/api-82.jar https://furkank.net/maven/de/robv/android/xposed/api/82/api-82.jar
          fi
          test -s app/libs/api-82.jar

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Remove local Java home for CI
        run: |
          sed -i '/^org\.gradle\.java\.home=/d' gradle.properties
          sed -i '/^org\.gradle\.java\.installations\.auto-download=/d' gradle.properties

      - name: Build release
        run: ./gradlew :app:assembleRelease

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: 自动构建 ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: |
            自动构建发布（每次提交 main 自动发布）。

            - 提交：${{ github.sha }}
            - 触发：${{ github.actor }}
            - 工作流：${{ github.workflow }} / run ${{ github.run_number }}
          files: |
            app/build/outputs/apk/release/*.apk
